<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student's System Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* All your existing styles remain the same */
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #e2e2e2; margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; }
        #error-banner { display: none; position: absolute; top: 10%; width: 380px; background-color: #ffc425; padding: 15px 20px; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); justify-content: space-between; align-items: center; z-index: 100; }
        .error-content { display: flex; align-items: center; font-weight: 500; color: #333; }
        .error-content i { font-size: 24px; margin-right: 15px; }
        .close-btn { background: black; color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #f7f7f7; padding: 40px 30px; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 380px; text-align: center; }
        .logo-box img { width: 65px; height: 65px; border-radius: 8px; object-fit: contain; }
        h1 { font-size: 24px; margin: 15px 0 30px; color: #000; font-weight: 600; }
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #777; font-size: 16px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px 12px 12px 45px; border: 1px solid #dcdcdc; border-radius: 2px; background-color: #fafafa; font-size: 16px; color: #333; }
        .remember-me { text-align: left; margin: 15px 0 25px; display: flex; align-items: center; font-size: 14px; color: #333; }
        .remember-me input { margin-right: 10px; cursor: pointer; width: 16px; height: 16px; }
        .sign-in-btn { width: 100%; padding: 14px; background-color: #006ec1; color: white; border: none; border-radius: 4px; font-size: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="error-banner">
        <div class="error-content">
            <i class="fas fa-exclamation-triangle"></i>
            <span>Invalid Login Credentials</span>
        </div>
        <button onclick="hideError()" class="close-btn">&times;</button>
    </div>

    <div class="login-card">
        <div class="logo-box">
            <img src="logo.png">
        </div>
        
        <h1>Student's System</h1>

        <form id="loginForm">
            <div class="input-group">
                <i class="fa-regular fa-user"></i>
                <input type="text" id="username" placeholder="Username" required autocomplete="off">
            </div>

            <div class="input-group">
                <i class="fa-solid fa-key"></i>
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <div class="remember-me">
                <input type="checkbox" id="remember">
                <label for="remember">Remember username</label>
            </div>

            <button type="submit" class="sign-in-btn">Sign In</button>
        </form>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorBanner = document.getElementById('error-banner');

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Authentication Logic
            if (user === "20253154" && pass === "YR20253154") {
                // REDIRECTION COMMAND: Takes user to the Dashboard page
                window.location.href = "Dashboard.html"; 
            } else {
                errorBanner.style.display = 'flex';
            }
        });

        function hideError() {
            errorBanner.style.display = 'none';
        }
    </script>
</body>
</html>
