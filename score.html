<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Results Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #ffffff;
            color: #333;
        }

        /* Top Blue Navigation Bar */
        .navbar {
            background-color: #0066cc;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 40px;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-left img {
            height: 30px;
            border-radius: 5px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 14px;
        }

        /* Header Section with Arabic/English Text */
        .header-content {
            text-align: center;
            padding: 20px 0;
            color: #00008b;
        }

        .header-content h2 {
            margin: 5px 0;
            font-size: 18px;
        }

        .header-content p {
            margin: 5px 0;
            font-weight: bold;
            font-size: 16px;
        }

        /* Table Container and Controls */
        .container {
            width: 98%;
            margin: 0 auto;
            border: 1px solid #e0e0e0;
        }

        .controls {
            padding: 10px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .btn {
            border: 1px solid #ccc;
            padding: 5px 10px;
            background: #f9f9f9;
            cursor: pointer;
        }

        .date-row {
            background-color: #f5f5f5;
            padding: 10px;
            font-size: 13px;
            font-weight: bold;
            border-bottom: 1px solid #e0e0e0;
        }

        /* The Results Table */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: #fff;
            color: #0066cc;
            text-align: left;
            padding: 12px;
            font-size: 14px;
            border-bottom: 1px solid #e0e0e0;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        .footer-bar {
            background-color: #ffcc33; /* Yellow background as requested */
            height: 15px;
            width: 100%;
            margin-top: 20px;
        }

        .pagination {
            text-align: right;
            padding: 5px 10px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="nav-left">
            <img src="https://via.placeholder.com/30x30/red/white?text=Logo" alt="Logo"> <span>Students</span>
        </div>
        <div class="nav-right">
            <span>💬</span>
            <span>❓ ⌄</span>
            <span>👤 20253154 ⌄</span>
        </div>
    </div>

    <div class="header-content">
        <h2>Student No:,</h2>
        <h2 style="color: blue;">20253154</h2>
        <p dir="rtl">هذه النتيجة مبدئية لاعلان الطلاب ولا يعتد بها كوثيقة رسمية</p>
    </div>

    <div class="container">
        <div class="controls">
            <button class="btn">▶</button>
            <button class="btn" style="background-color: #337ab7; color: white;">≡ Date</button>
        </div>
        
        <div class="date-row">
            Date: 2026-04-02
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 50%;">Module</th>
                    <th style="width: 25%; text-align: center;">Score</th>
                    <th style="width: 25%; text-align: center;">Total</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>ISK101 ( 240 )</td>
                    <td style="text-align: center;">238</td>
                    <td style="text-align: center;" dir="rtl">ممتاز</td>
                </tr>
                <tr>
                    <td>INT 102 ( 210 )</td>
                    <td style="text-align: center;">200</td>
                    <td style="text-align: center;" dir="rtl">ممتاز</td>
                </tr>
                <tr>
                    <td>BMS 103 ( 300 )</td>
                    <td style="text-align: center;">293</td>
                    <td style="text-align: center;" dir="rtl">ممتاز</td>
                </tr>
            </tbody>
        </table>
        
        <div class="pagination">1 - 3</div>
        <div class="footer-bar"></div> </div>

</body>
</html>
